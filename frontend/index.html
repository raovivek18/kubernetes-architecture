<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KubeOps Control Center</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">▲</span>
                <h1>KubeOps</h1>
            </div>
            <div class="version-badge">
                <span>Version</span>
                <span id="app-version">Loading...</span>
            </div>
        </header>

        <section class="grid">
            <div class="card glass status-card">
                <h2>System Health</h2>
                <div class="status-list">
                    <div class="status-item">
                        <span>Frontend</span>
                        <div class="status-indicator online"></div>
                    </div>
                    <div class="status-item">
                        <span>Backend API</span>
                        <div id="backend-indicator" class="status-indicator offline"></div>
                    </div>
                    <div class="status-item">
                        <span>Database</span>
                        <div id="db-indicator" class="status-indicator offline"></div>
                    </div>
                </div>
            </div>

            <div class="card glass task-form-card">
                <h2>Create Task</h2>
                <form id="task-form">
                    <div class="input-group">
                        <input type="text" id="task-input" required placeholder="Enter task title...">
                        <button type="submit" id="submit-btn">Add Task</button>
                    </div>
                </form>
            </div>
        </section>

        <section class="card glass task-list-card">
            <h2>Active Tasks</h2>
            <div class="tasks-container">
                <ul id="task-list">
                    <li class="loading-item">Loading tasks...</li>
                </ul>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
